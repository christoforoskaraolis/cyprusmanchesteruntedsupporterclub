<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#DA291C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MUCY" />
    <meta name="color-scheme" content="light" />
    <title>Cyprus Manchester United Supporters Club</title>
    <script>
      (function () {
        var path = location.pathname.replace(/\/+$/, '') || '/';
        if (path === '/admin') {
          var manifest = document.querySelector('link[rel="manifest"]');
          if (manifest) manifest.setAttribute('href', '/manifest-admin.webmanifest');
          var appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (appleTitle) appleTitle.setAttribute('content', 'MUCY Admin');
          document.title = 'MUCY Admin — Cyprus Manchester United Supporters Club';
          try {
            localStorage.setItem('cmusc_admin_app', '1');
          } catch (e) {}
        }
        if (path === '/' && localStorage.getItem('cmusc_admin_app') === '1') {
          location.replace('/admin?source=admin-app');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
